<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Diabetes Prediction System</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Diabetes Prediction System</h1>

        <form id="predictionForm">

            <input type="number" id="age" placeholder="Age" required>

            <select id="hypertension" required>
                <option value="">Hypertension</option>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>

            <select id="heart_disease" required>
                <option value="">Heart Disease</option>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>

            <input type="number" step="0.1" id="bmi" placeholder="BMI" required>

            <input type="number" step="0.1" id="hba1c" placeholder="HbA1c Level" required>

            <input type="number" id="glucose" placeholder="Blood Glucose Level" required>

            <select id="gender" required>
                <option value="">Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>

            <select id="smoking" required>
                <option value="">Smoking History</option>
                <option value="current">Current</option>
                <option value="ever">Ever</option>
                <option value="former">Former</option>
                <option value="never">Never</option>
                <option value="not current">Not Current</option>
            </select>

            <button type="submit">Predict</button>

        </form>

        <div id="result"></div>

    </div>

    <script src="script.js"></script>

</body>

</html>
